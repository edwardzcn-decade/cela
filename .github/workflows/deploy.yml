name: Deploy Cela demo site to GitHub Pages
run-name: Build and publish demo site to GitHub Pages by @${{ github.actor }}

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-deploy:
    name: Build and publish Pages site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js toolchain
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install CSS dependencies
        run: npm ci

      - name: Build generated CSS artifact
        run: npm run build:css

      # Install zola via install-action
      - name: Install Zola
        uses: taiki-e/install-action@v2
        with:
          tool: zola@0.22.1

      # Build zola static site (pre-deploy)
      - name: Build pre-deploy Pages site
        run: zola build

      # Deploy to GitHub Pages via peaceiris/actions-gh-pages
      - name: Deploy to GitHub Pages
        if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public  # Zola default public folder

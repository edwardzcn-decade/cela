name: zola-themes-cela-ci

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install CSS tooling
        run: npm ci

      - name: Build generated CSS
        run: npm run build:css:min

      - name: Install Zola
        uses: taiki-e/install-action@v2
        with:
          tool: zola@0.22.1

      - name: Check site
        run: zola check --skip-external-links

      - name: Zola build
        run: zola build

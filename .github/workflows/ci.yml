name: Cela theme CI
run-name: Validate theme build and config compatibility by @${{ github.actor }}

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  validate-build:
    name: Validate theme build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js toolchain
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install CSS dependencies
        run: npm ci

      - name: Build generated CSS
        run: npm run build:css:min

      - name: Install Zola
        uses: taiki-e/install-action@v2
        with:
          tool: zola@0.22.1

      - name: Check primary demo site
        run: zola check

      - name: Build primary demo site
        run: zola build

      - name: Check config compatibility
        run: |
          mkdir -p .compat-site/themes
          ln -s "$GITHUB_WORKSPACE" .compat-site/themes/cela
          ln -s "$GITHUB_WORKSPACE/content" .compat-site/content
          ln -s "$GITHUB_WORKSPACE/static" .compat-site/static
          cp tests/config-v1.toml.bak .compat-site/config.toml
          zola --root .compat-site check --skip-external-links
          zola --root .compat-site build
